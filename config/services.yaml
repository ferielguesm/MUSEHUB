# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration

parameters:
    app.user_avatar_directory: '%kernel.project_dir%/public/uploads/avatars'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_publishable_key: '%env(STRIPE_PUBLISHABLE_KEY)%'
    stripe_webhook_secret: '%env(STRIPE_WEBHOOK_SECRET)%'
    app_url: '%env(APP_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $discordWebhookUrl: '%env(DISCORD_WEBHOOK_URL)%'
            # OpenAI API for comment moderation
            $openaiApiKey: '%env(OPENAI_API_KEY)%'
            $openaiApiUrl: 'https://api.openai.com/v1'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
    App\Service\HarvardArtService:
        arguments:
            $apiKey: '%env(HARVARD_API_KEY)%'
    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # OpenAI Service Configuration
    App\Service\OpenAIService:
        arguments:
            $apiKey: '%env(OPENAI_API_KEY)%'

    App\Service\StripePaymentService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Service\MatrixService:
        arguments:
            $matrixHomeserver: '%env(MATRIX_HOMESERVER)%'
            $matrixAccessToken: '%env(MATRIX_ACCESS_TOKEN)%'
            $matrixUserId: '%env(MATRIX_USER_ID)%'

    App\Service\IssoService:
        arguments:
            $issoUrl: '%env(ISSO_URL)%'
